<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI 歌詞工具 - 自動轉 LRC</title>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.instance.js"></script>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #121212; color: #eee; padding: 20px; display: flex; justify-content: center; }
        .main-card { max-width: 600px; width: 100%; background: #1e1e1e; padding: 30px; border-radius: 15px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #333; }
        
        /* 進度條樣式 */
        .progress-container { width: 100%; background-color: #444; border-radius: 10px; margin: 20px 0; height: 20px; overflow: hidden; display: none; }
        #progressBar { width: 0%; height: 100%; background-color: #4caf50; transition: width 0.3s, background-color 0.5s; }
        .progress-active #progressBar { background-color: #4caf50; }
        .progress-idle #progressBar { background-color: #888; }

        .status-dot { height: 10px; width: 10px; background-color: #bbb; border-radius: 50%; display: inline-block; margin-right: 8px; }
        .online { background-color: #4caf50; box-shadow: 0 0 8px #4caf50; }
        
        #log { background: #000; color: #00ff00; text-align: left; font-family: 'Courier New', monospace; padding: 15px; height: 120px; overflow-y: auto; font-size: 12px; margin-top: 20px; border-radius: 8px; border: 1px solid #333; }
        
        .controls { display: flex; flex-direction: column; gap: 10px; margin-top: 20px; }
        button { padding: 12px; border-radius: 8px; border: none; cursor: pointer; font-weight: bold; font-size: 15px; transition: 0.2s; }
        #goBtn { background: #007bff; color: white; }
        #goBtn:disabled { background: #444; color: #888; cursor: not-allowed; }
        #downloadArea { display: none; margin-top: 15px; padding: 15px; border: 1px solid #4caf50; border-radius: 10px; background: rgba(76, 175, 80, 0.1); }
        .btn-download { background: #4caf50; color: white; margin-right: 10px; }
        .btn-cancel { background: #f44336; color: white; }
        
        input[type="file"] { margin: 10px 0; padding: 15px; border: 2px dashed #555; border-radius: 10px; width: 100%; box-sizing: border-box; }
    </style>
</head>
<body>

<div class="main-card">
    <h2>🎵 AI 語音轉歌詞 (LRC)</h2>
    <div style="font-size: 14px; margin-bottom: 15px;">
        <span id="dot" class="status-dot"></span> 狀態: <span id="sysStatus">準備中...</span>
    </div>

    <input type="file" id="audioFile" accept="audio/*">
    
    <div class="progress-container" id="progressBox">
        <div id="progressBar"></div>
    </div>
    <div id="progressText" style="font-size: 12px; color: #aaa;"></div>

    <div class="controls">
        <button id="goBtn" disabled>請先選擇音訊檔案</button>
    </div>

    <div id="downloadArea">
        <p style="color: #4caf50; margin-top: 0;">✨ 轉換完成！</p>
        <button id="dlBtn" class="btn-download">下載 .LRC 檔案</button>
        <button id="cancelBtn" class="btn-cancel">清除重來</button>
    </div>
    
    <div id="log">等待操作...</div>
</div>

<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';

    const logBox = document.getElementById('log');
    const goBtn = document.getElementById('goBtn');
    const dot = document.getElementById('dot');
    const sysStatus = document.getElementById('sysStatus');
    const progressBox = document.getElementById('progressBox');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const downloadArea = document.getElementById('downloadArea');

    let transcriber = null;
    let generatedBlobUrl = null;

    function writeLog(msg) {
        const time = new Date().toLocaleTimeString();
        logBox.innerHTML += `[${time}] ${msg}<br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // 初始化 OpenCC
    const converter = OpenCC.Converter({ from: 'cn', to: 'tw' });

    window.onload = () => {
        dot.classList.add('online');
        sysStatus.innerText = "系統就緒";
        writeLog("🚀 系統已就緒。提示：首次執行會下載約 75MB 的模型。");
    };

    document.getElementById('audioFile').onchange = (e) => {
        if(e.target.files.length > 0) {
            goBtn.disabled = false;
            goBtn.innerText = "開始 AI 辨識";
            writeLog(`已選取: ${e.target.files[0].name}`);
            downloadArea.style.display = 'none';
        }
    };

    goBtn.onclick = async () => {
        const file = document.getElementById('audioFile').files[0];
        if (!file) return;

        // UI 初始化
        goBtn.disabled = true;
        progressBox.style.display = 'block';
        progressBar.style.width = '0%';
        progressBar.style.backgroundColor = '#888'; // 開始前是灰色
        downloadArea.style.display = 'none';

        try {
            if (!transcriber) {
                writeLog("正在加載 AI 模型 (Whisper Tiny)...");
                transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny', {
                    progress_callback: (p) => {
                        if(p.status === 'progress') {
                            const pct = Math.round(p.progress);
                            progressBar.style.width = pct + '%';
                            sysStatus.innerText = `模型載入中: ${pct}%`;
                        }
                    }
                });
                writeLog("✅ 模型載入成功！");
            }

            // 變色：開始運算變綠色
            progressBar.style.backgroundColor = '#4caf50';
            writeLog("正在讀取並解碼音訊...");
            sysStatus.innerText = "音訊處理中...";

            const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const arrayBuffer = await file.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            const float32Data = audioBuffer.getChannelData(0);

            writeLog(`開始辨識 (時長: ${Math.round(audioBuffer.duration)}s)...`);
            
            const output = await transcriber(float32Data, {
                chunk_length_s: 30,
                stride_length_s: 5,
                language: 'chinese',
                task: 'transcribe',
                return_timestamps: true,
                callback_function: (p) => {
                    // 這裡可以處理實時進度（如果模型支持）
                }
            });

            writeLog("辨識完成，正在格式化 LRC...");
            let lrcContent = "[tool:AI LRC Generator]\n";
            
            for (const chunk of output.chunks) {
                const start = formatLrcTime(chunk.timestamp[0]);
                const text = converter(chunk.text.trim());
                lrcContent += `[${start}]${text}\n`;
            }

            // 準備下載
            const blob = new Blob([lrcContent], { type: 'text/plain' });
            generatedBlobUrl = URL.createObjectURL(blob);
            
            document.getElementById('dlBtn').onclick = () => {
                const a = document.createElement('a');
                a.href = generatedBlobUrl;
                a.download = file.name.replace(/\.[^/.]+$/, "") + ".lrc";
                a.click();
            };

            progressBar.style.width = '100%';
            sysStatus.innerText = "轉換完成";
            writeLog("🎉 處理完畢！請點擊下載。");
            downloadArea.style.display = 'block';

        } catch (err) {
            writeLog(`❌ 錯誤: ${err.message}`);
            sysStatus.innerText = "發生錯誤";
            goBtn.disabled = false;
        }
    };

    document.getElementById('cancelBtn').onclick = () => {
        downloadArea.style.display = 'none';
        progressBox.style.display = 'none';
        goBtn.disabled = false;
        goBtn.innerText = "開始 AI 辨識";
        document.getElementById('audioFile').value = "";
        writeLog("操作已取消。");
    };

    function formatLrcTime(seconds) {
        const s = seconds || 0;
        const mm = Math.floor(s / 60).toString().padStart(2, '0');
        const ss = Math.floor(s % 60).toString().padStart(2, '0');
        const xx = Math.floor((s % 1) * 100).toString().padStart(2, '0');
        return `${mm}:${ss}.${xx}`;
    }
</script>

</body>
</html>
