<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>AI 歌詞工具 - 強力診斷版</title>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.instance.js"></script>
    <style>
        body { font-family: sans-serif; background: #1a1a1a; color: #eee; padding: 20px; line-height: 1.5; }
        .container { max-width: 600px; margin: auto; background: #2d2d2d; padding: 25px; border-radius: 12px; }
        #logBox { background: #000; color: #0f0; font-family: monospace; padding: 10px; height: 200px; overflow-y: auto; font-size: 12px; border-radius: 5px; margin-top: 15px; }
        button { background: #4caf50; color: white; border: none; padding: 15px; width: 100%; border-radius: 8px; cursor: pointer; font-size: 18px; }
        button:disabled { background: #555; }
        progress { width: 100%; height: 20px; }
    </style>
</head>
<body>

<div class="container">
    <h2>🛠️ AI 轉歌詞 (自動繁體版)</h2>
    <p style="color: #aaa;">支援長音檔 • 純瀏覽器運算</p>
    
    <input type="file" id="audioUpload" accept="audio/*" style="margin-bottom: 20px;">
    <button id="startBtn">啟動 AI 並轉換</button>

    <div id="status" style="margin-top: 15px; font-weight: bold;">目前狀態：等待指令</div>
    <progress id="pBar" value="0" max="100" style="display:none;"></progress>
    
    <div id="logBox">系統日誌 (若沒反應請截圖此區)：<br></div>
</div>

<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';

    const log = (msg) => {
        const box = document.getElementById('logBox');
        box.innerHTML += `> ${msg}<br>`;
        box.scrollTop = box.scrollHeight;
        console.log(msg);
    };

    const converter = OpenCC.Converter({ from: 'cn', to: 'tw' });
    let transcriber = null;

    document.getElementById('startBtn').onclick = async () => {
        const file = document.getElementById('audioUpload').files[0];
        if (!file) return alert("請先選檔案！");

        const btn = document.getElementById('startBtn');
        const pBar = document.getElementById('pBar');
        btn.disabled = true;
        pBar.style.display = 'block';

        try {
            log("正在初始化環境...");
            if (!transcriber) {
                log("正在下載 AI 模型 (約 77MB)，請不要離開...");
                transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny', {
                    progress_callback: (d) => {
                        if (d.status === 'progress') {
                            pBar.value = d.progress;
                            document.getElementById('status').innerText = `下載中: ${Math.round(d.progress)}%`;
                        }
                    }
                });
                log("✅ 模型載入成功！");
            }

            log(`讀取音檔: ${file.name} (${Math.round(file.size/1024/1024)}MB)`);
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            
            log("正在解碼音訊 (這步驟最吃記憶體)...");
            const arrayBuffer = await file.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            const float32Array = audioBuffer.getChannelData(0);
            log(`解碼完成，時長: ${Math.round(audioBuffer.duration)} 秒`);

            log("🚀 AI 開始辨識 (長歌曲會分段處理)...");
            document.getElementById('status').innerText = "AI 正在聽歌中...請稍候";
            
            const output = await transcriber(float32Array, {
                language: 'chinese',
                chunk_length_s: 30,
                stride_length_s: 5,
                return_timestamps: true
            });

            log("正在生成繁體 LRC...");
            let lrc = "";
            output.chunks.forEach(c => {
                const time = formatTime(c.timestamp[0]);
                lrc += `[${time}]${converter(c.text.trim())}\n`;
            });

            const blob = new Blob([lrc], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = file.name.replace(/\.[^/.]+$/, "") + ".lrc";
            a.click();
            
            log("🎉 轉換成功！檔案已彈出下載");
            document.getElementById('status').innerText = "✅ 完成！";

        } catch (e) {
            log(`❌ 錯誤: ${e.message}`);
            document.getElementById('status').innerText = "發生錯誤";
        } finally {
            btn.disabled = false;
        }
    };

    function formatTime(s = 0) {
        const m = Math.floor(s / 60).toString().padStart(2, '0');
        const sec = Math.floor(s % 60).toString().padStart(2, '0');
        const ms = Math.floor((s % 1) * 100).toString().padStart(2, '0');
        return `${m}:${sec}.${ms}`;
    }
</script>

</body>
</html>
