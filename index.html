<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>AI 歌詞工具 Pro - 穩定不卡頓版</title>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.instance.js"></script>
    <style>
        :root { --primary: #4caf50; --bg: #121212; --card: #1e1e1e; }
        body { font-family: system-ui, -apple-system, sans-serif; background: var(--bg); color: #eee; padding: 20px; display: flex; justify-content: center; }
        .main-card { max-width: 600px; width: 100%; background: var(--card); padding: 30px; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        
        /* 進度條系統 */
        .progress-wrapper { margin: 25px 0; display: none; }
        .progress-bar-container { width: 100%; background: #333; height: 12px; border-radius: 6px; overflow: hidden; }
        #progressBar { width: 0%; height: 100%; background: #888; transition: width 0.3s; }
        .is-running #progressBar { background: var(--primary); box-shadow: 0 0 10px var(--primary); }
        #progressText { font-size: 13px; color: #aaa; margin-top: 8px; text-align: center; }

        .status-header { display: flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 20px; }
        .dot { height: 10px; width: 10px; background: #555; border-radius: 50%; }
        .dot.online { background: var(--primary); box-shadow: 0 0 8px var(--primary); }
        
        #log { background: #000; color: #00ff00; padding: 15px; height: 120px; overflow-y: auto; font-family: monospace; font-size: 12px; border-radius: 10px; margin-top: 20px; border: 1px solid #333; }
        
        .btn-group { display: flex; flex-direction: column; gap: 10px; }
        button { padding: 15px; border-radius: 12px; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; font-size: 16px; }
        #goBtn { background: #007bff; color: white; }
        #goBtn:disabled { background: #444; cursor: not-allowed; opacity: 0.6; }
        
        #downloadArea { display: none; margin-top: 20px; animation: fadeIn 0.5s; }
        .btn-dl { background: var(--primary); color: white; width: 100%; }
        .btn-cancel { background: #f44336; color: white; width: 100%; margin-top: 8px; }

        input[type="file"] { background: #252525; padding: 20px; border: 2px dashed #444; border-radius: 12px; width: 100%; box-sizing: border-box; cursor: pointer; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div class="main-card" id="app">
    <div class="status-header">
        <div id="dot" class="dot"></div>
        <h2 style="margin:0">AI 歌詞轉檔 Pro</h2>
    </div>

    <input type="file" id="audioFile" accept="audio/*">
    
    <div class="progress-wrapper" id="progressWrapper">
        <div class="progress-bar-container">
            <div id="progressBar"></div>
        </div>
        <div id="progressText">準備處理...</div>
    </div>

    <div class="btn-group">
        <button id="goBtn" disabled>請先選擇音樂檔案</button>
    </div>

    <div id="downloadArea">
        <button id="dlBtn" class="btn-dl">⬇️ 下載 .LRC 歌詞檔</button>
        <button id="cancelBtn" class="btn-cancel">重置</button>
    </div>
    
    <div id="log">系統日誌：等待指令...</div>
</div>

<script id="worker-script" type="text/javascript-worker">
    import { pipeline, env } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.16.0';
    
    env.allowLocalModels = false;
    let transcriber = null;

    self.onmessage = async (e) => {
        const { audioData, modelName } = e.data;

        try {
            if (!transcriber) {
                self.postMessage({ status: 'log', msg: '正在下載高準確度模型 (約 150MB)...' });
                transcriber = await pipeline('automatic-speech-recognition', modelName, {
                    progress_callback: (p) => {
                        if (p.status === 'progress') {
                            self.postMessage({ status: 'downloading', progress: p.progress });
                        }
                    }
                });
                self.postMessage({ status: 'log', msg: '✅ 模型加載完畢' });
            }

            self.postMessage({ status: 'log', msg: 'AI 開始辨識語音 (這需要一點時間)...' });
            
            const output = await transcriber(audioData, {
                chunk_length_s: 30,
                stride_length_s: 5,
                language: 'chinese',
                task: 'transcribe',
                return_timestamps: true,
                // 強制模型輸出，減少幻聽
                repetition_penalty: 1.2
            });

            self.postMessage({ status: 'complete', output });
        } catch (err) {
            self.postMessage({ status: 'error', msg: err.message });
        }
    };
</script>

<script type="module">
    const logBox = document.getElementById('log');
    const goBtn = document.getElementById('goBtn');
    const progressWrapper = document.getElementById('progressWrapper');
    const progressBar = document.getElementById('progressBar');
    const progressText = document.getElementById('progressText');
    const downloadArea = document.getElementById('downloadArea');
    const dot = document.getElementById('dot');

    let worker = null;
    let generatedBlobUrl = null;
    const converter = OpenCC.Converter({ from: 'cn', to: 'tw' });

    function writeLog(msg, isError = false) {
        const time = new Date().toLocaleTimeString();
        logBox.innerHTML += `<div style="color:${isError?'#ff4444':'#00ff00'}">[${time}] ${msg}</div>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // 初始化 Web Worker
    const blob = new Blob([document.getElementById('worker-script').textContent], { type: 'text/javascript' });
    worker = new Worker(URL.createObjectURL(blob), { type: 'module' });

    worker.onmessage = (e) => {
        const data = e.data;
        if (data.status === 'log') writeLog(data.msg);
        
        if (data.status === 'downloading') {
            const p = Math.round(data.progress);
            progressBar.style.width = p + '%';
            progressText.innerText = `下載模型中: ${p}%`;
        }

        if (data.status === 'complete') {
            processResult(data.output);
        }

        if (data.status === 'error') {
            writeLog('❌ 錯誤: ' + data.msg, true);
            resetUI();
        }
    };

    window.onload = () => {
        dot.classList.add('online');
        writeLog("🚀 系統就緒。建議使用 Chrome 瀏覽器以獲得最佳效能。");
    };

    document.getElementById('audioFile').onchange = (e) => {
        if(e.target.files.length > 0) {
            goBtn.disabled = false;
            goBtn.innerText = "開始轉化歌詞";
            writeLog("已選取檔案：" + e.target.files[0].name);
        }
    };

    goBtn.onclick = async () => {
        const file = document.getElementById('audioFile').files[0];
        if (!file) return;

        goBtn.disabled = true;
        progressWrapper.style.display = 'block';
        document.getElementById('app').classList.add('is-running');
        progressBar.style.width = '0%';
        progressBar.style.backgroundColor = '#888'; // 下載時灰色

        try {
            writeLog("正在解碼音訊... (請稍候)");
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const arrayBuffer = await file.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            const float32Data = audioBuffer.getChannelData(0);

            // 轉給後台處理
            progressBar.style.backgroundColor = '#4caf50'; // 運算時綠色
            progressText.innerText = "AI 正在分析旋律與歌詞...";
            worker.postMessage({ 
                audioData: float32Data, 
                modelName: 'Xenova/whisper-base' // 升級模型確保準確
            });

        } catch (err) {
            writeLog("解碼失敗: " + err.message, true);
            resetUI();
        }
    };

    function processResult(output) {
        writeLog("✅ 辨識完成，正在生成 LRC 檔案...");
        let lrc = "[by:AI LRC Generator]\n";
        
        output.chunks.forEach(chunk => {
            const time = formatLrcTime(chunk.timestamp[0]);
            const text = converter(chunk.text.trim());
            if(text) lrc += `[${time}]${text}\n`;
        });

        const blob = new Blob([lrc], { type: 'text/plain' });
        generatedBlobUrl = URL.createObjectURL(blob);
        
        progressBar.style.width = '100%';
        progressText.innerText = "完成！";
        downloadArea.style.display = 'block';
        
        document.getElementById('dlBtn').onclick = () => {
            const a = document.createElement('a');
            a.href = generatedBlobUrl;
            a.download = document.getElementById('audioFile').files[0].name.split('.')[0] + ".lrc";
            a.click();
        };
    }

    function resetUI() {
        goBtn.disabled = false;
        goBtn.innerText = "再次轉化";
        document.getElementById('app').classList.remove('is-running');
        downloadArea.style.display = 'none';
    }

    document.getElementById('cancelBtn').onclick = () => {
        location.reload(); // 最簡單乾淨的重置
    };

    function formatLrcTime(seconds) {
        const s = seconds || 0;
        const mm = Math.floor(s / 60).toString().padStart(2, '0');
        const ss = Math.floor(s % 60).toString().padStart(2, '0');
        const xx = Math.floor((s % 1) * 100).toString().padStart(2, '0');
        return `${mm}:${ss}.${xx}`;
    }
</script>

</body>
</html>
