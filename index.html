<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>AI 歌詞工具 - 終極相容版</title>
    <script src="https://cdn.jsdelivr.net/npm/opencc-js@1.0.5/dist/umd/full.instance.js"></script>
    <style>
        body { font-family: sans-serif; background: #121212; color: #fff; padding: 20px; text-align: center; }
        .main-card { max-width: 500px; margin: auto; background: #222; padding: 30px; border-radius: 20px; border: 1px solid #444; }
        .status-dot { height: 10px; width: 10px; background-color: #bbb; border-radius: 50%; display: inline-block; margin-right: 5px; }
        .online { background-color: #4caf50; }
        #log { background: #000; color: #00ff00; text-align: left; font-family: monospace; padding: 10px; height: 150px; overflow-y: auto; font-size: 11px; margin-top: 20px; border-radius: 5px; border: 1px solid #333; }
        button { background: #007bff; color: white; border: none; padding: 15px 30px; border-radius: 10px; cursor: pointer; font-size: 16px; width: 100%; margin-top: 10px; }
        button:disabled { background: #444; cursor: not-allowed; }
        input[type="file"] { margin: 20px 0; border: 1px dashed #666; padding: 20px; width: 80%; }
    </style>
</head>
<body>

<div class="main-card">
    <h2>🎵 免費 AI 歌詞轉檔</h2>
    <div style="font-size: 12px; margin-bottom: 20px;">
        <span id="dot" class="status-dot"></span> 系統狀態: <span id="sysStatus">初始化中...</span>
    </div>

    <input type="file" id="audioFile" accept="audio/*">
    <button id="goBtn" disabled>請先上傳檔案</button>
    
    <div id="log">系統日誌準備就緒...</div>
</div>

<script type="module">
    import { pipeline } from 'https://cdn.jsdelivr.net/npm/@xenova/transformers@2.6.0';

    const logBox = document.getElementById('log');
    const goBtn = document.getElementById('goBtn');
    const dot = document.getElementById('dot');
    const sysStatus = document.getElementById('sysStatus');
    const converter = OpenCC.Converter({ from: 'cn', to: 'tw' });

    function writeLog(msg) {
        const time = new Date().toLocaleTimeString();
        logBox.innerHTML += `[${time}] ${msg}<br>`;
        logBox.scrollTop = logBox.scrollHeight;
    }

    // 啟動檢測
    window.onload = () => {
        writeLog("網頁已載入，正在連線至 AI 伺服器...");
        dot.classList.add('online');
        sysStatus.innerText = "連線正常，等待檔案";
        writeLog("✅ 環境檢測通過。提示：10分鐘歌曲需約 8GB 記憶體。");
    };

    document.getElementById('audioFile').onchange = (e) => {
        if(e.target.files.length > 0) {
            goBtn.disabled = false;
            goBtn.innerText = "開始 AI 辨識";
            writeLog(`已選取檔案: ${e.target.files[0].name}`);
        }
    };

    let transcriber = null;

    goBtn.onclick = async () => {
        const file = document.getElementById('audioFile').files[0];
        goBtn.disabled = true;
        goBtn.innerText = "處理中...";

        try {
            if (!transcriber) {
                writeLog("正在下載 AI 模型 (初次使用約 77MB)...");
                transcriber = await pipeline('automatic-speech-recognition', 'Xenova/whisper-tiny', {
                    progress_callback: (p) => {
                        if(p.status === 'progress') {
                            sysStatus.innerText = `模型下載中: ${Math.round(p.progress)}%`;
                        }
                    }
                });
                writeLog("✅ 模型下載完成！");
            }

            writeLog("正在解碼音頻內容 (請稍候)...");
            const audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 16000 });
            const arrayBuffer = await file.arrayBuffer();
            const audioBuffer = await audioCtx.decodeAudioData(arrayBuffer);
            const float32Data = audioBuffer.getChannelData(0);

            writeLog(`開始辨識 ${Math.round(audioBuffer.duration)} 秒的內容...`);
            sysStatus.innerText = "AI 辨識中...";

            const output = await transcriber(float32Data, {
                chunk_length_s: 30,
                stride_length_s: 5,
                language: 'chinese',
                return_timestamps: true
            });

            writeLog("辨識完畢，正在導出繁體 LRC...");
            let lrc = "";
            output.chunks.forEach(chunk => {
                const timestamp = formatLrcTime(chunk.timestamp[0]);
                lrc += `[${timestamp}]${converter(chunk.text.trim())}\n`;
            });

            // 下載檔案
            const blob = new Blob([lrc], { type: 'text/plain' });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = file.name.replace(/\.[^/.]+$/, "") + ".lrc";
            a.click();

            writeLog("🎉 下載已啟動！");
            sysStatus.innerText = "轉換完成";
        } catch (err) {
            writeLog(`❌ 錯誤: ${err.message}`);
            sysStatus.innerText = "發生錯誤";
        } finally {
            goBtn.disabled = false;
            goBtn.innerText = "再次轉換";
        }
    };

    function formatLrcTime(seconds) {
        const s = seconds || 0;
        const mm = Math.floor(s / 60).toString().padStart(2, '0');
        const ss = Math.floor(s % 60).toString().padStart(2, '0');
        const xx = Math.floor((s % 1) * 100).toString().padStart(2, '0');
        return `${mm}:${ss}.${xx}`;
    }
</script>

</body>
</html>
